name: CI
run-name: CI - ${{ github.ref_name }} staging (by @${{ github.actor }}) -- ${{ github.event.head_commit.message }}

# Test/lint (and audit) gate the Docker build+push — the build job only runs if `verify`
# succeeds, and image push only happens on a push to master (never on a PR), never with `latest`.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # Type-aware ESLint rules (no-unsafe-member-access, etc.) resolve Prisma enums/client
        # methods as `any` without a generated client on disk. `prisma generate` itself never
        # touches a live database, but Prisma 7's config file (prisma.config.ts) resolves
        # DATABASE_URL eagerly and throws if it's unset — so a syntactically valid dummy value
        # is enough here; no real database is required for this step.
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: npm audit (fails the build — never auto-fixed here)
        # High/critical vulnerabilities fail CI outright. Do NOT change this to `audit fix
        # --force` in this workflow — that silently pulls in breaking major-version bumps.
        # A real finding here is a devops/backend-dev decision, not something CI auto-resolves.
        run: npm audit --audit-level=high

  build-and-push:
    name: Build & push image to GHCR (SHA tag)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runtime image (app)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          # Immutable commit-SHA tag only — never `latest`. The CD workflow deploys this exact
          # tag, so a redeploy is always reproducible and traceable to a commit.
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push migrator image (one-shot `prisma migrate deploy`)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}-migrator
          cache-from: type=gha
          cache-to: type=gha,mode=max
