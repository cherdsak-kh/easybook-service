# Staging deploy compose file for easybook-service. SCP'd to the staging server by the CD
# workflow (.github/workflows/cd.yml) and driven with `docker-compose -f docker-compose.staging.yml
# up -d` AFTER the one-shot migration container (see docs/migration-safety-policy.md) has exited 0.
#
# This file owns EXACTLY the app container. Postgres (`postgres-sv`) and Redis (`redis-sv`) are
# pre-existing standalone containers on the external `easybook-network` — they are NOT declared,
# started, stopped, or otherwise managed here. Do not add them "for convenience"; that would let
# `docker-compose down` on this file take the database out from under other services on the box.
#
# IMAGE_TAG is the immutable commit SHA the CI workflow pushed to GHCR (never `latest`), supplied
# via the server's .env (see .env.staging.example) or an exported shell var before `up -d`.

services:
  easybook-service:
    image: ghcr.io/${GHCR_OWNER}/easybook-service:${IMAGE_TAG}
    container_name: easybook-service
    restart: unless-stopped
    # Runtime secrets (DATABASE_URL, SESSION_SECRET, CSRF_SECRET, REDIS_URL, LINE_*, ...) are
    # NOT listed here — the container entrypoint is `infisical run -- node dist/main.js`, which
    # resolves them from Infisical using INFISICAL_TOKEN below. Never put a real secret value in
    # this file.
    environment:
      NODE_ENV: production
      PORT: "3300"
      INFISICAL_TOKEN: ${INFISICAL_TOKEN}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: ${INFISICAL_ENV:-staging}
    ports:
      # Published to the host so the staging Nginx (which runs outside Docker on this box, see
      # docs/staging-runbook.md) can reverse-proxy to 127.0.0.1:3300.
      - '3300:3300'
    # Sensible ceilings for a single small LIFF-app instance, not a production capacity plan —
    # revisit if/when real staging traffic numbers exist.
    mem_limit: 512m
    cpus: 1.0
    networks:
      - easybook-network
    # Redundant with the image's own HEALTHCHECK but declared explicitly so `docker-compose ps`
    # / `docker inspect` on the server surface health without needing to know the image internals.
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3300/api/v1/health']
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

networks:
  easybook-network:
    external: true
